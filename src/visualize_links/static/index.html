<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>visualize-links: Visualize pointer-based data structures</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      font-size: large;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    header .status {
      padding: 2px 8px;
      border-radius: 999px;
    }

    header .ok {
      background: #e6ffed;
      color: #076b2f;
    }

    header .bad {
      background: #ffebeb;
      color: #7a0b0b;
    }

    header .warn {
      background: #fff7e6;
      color: #7a4b0b;
    }

    #hint {
      color: #565e6e;
      margin-left: auto;
      display: flex;
    }

    #title {
      margin-left: auto;
    }

    #freezeDiv {
      margin-left: auto;
    }

    #mainDiv {
      display: grid;
      grid-template-columns: 1fr 280px;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    #rightPaneAside {
      border-left: 1px solid #e5e7eb;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    #historyItemListDiv {
      overflow-y: auto;
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .historyItem {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .historyItem:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
    }

    .historyItem svg {
      width: 60px;
      height: 60px;
      margin-bottom: 8px;
    }

    .historyItem p {
      margin: 0;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
      color: #374151;
    }

    #canvasDiv {
      position: relative;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    #canvasSvg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .valueLink {
      stroke: #2c2c2c;
      stroke-width: 2px;
      stroke-opacity: 1;
    }

    .nameLink {
      stroke-width: 2px;
      stroke-opacity: 1;
      marker-end: url(#arrowheadEndMarker);
    }

    .valueNode {
      fill: #6ba8d3;
      stroke: #000000;
      stroke-width: 1px;
      cursor: move;
      rx: 5;
      ry: 5;
    }

    .nameNode {
      fill: #dca339;
      stroke: #ffffff;
      stroke-width: 1px;
      cursor: move;
      rx: 5;
      ry: 5;
    }

    .valueNodeLabel {
      fill: black;
      font-family: Verdana;
      font-size: 16px;
      text-anchor: left;
      dominant-baseline: "hanging";
      cursor: move;
    }

    .nameNodeLabel {
      fill: white;
      font-family: Verdana;
      font-size: 16px;
      text-anchor: left;
      dominant-baseline: "hanging";
      cursor: move;
    }

    .valueLinkForwardLabel {
      fill: #2c2c2c;
      font-family: Verdana;
      font-size: 16px;
      stroke-width: 0.7;
      text-anchor: middle;
      dominant-baseline: "middle";
    }

    .valueLinkBackwardLabel {
      fill: #2c2c2c;
      font-family: Verdana;
      font-size: 16px;
      stroke-width: 0.7;
      text-anchor: middle;
      dominant-baseline: "hanging";
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(250, 250, 250, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    #loadingScreen.visible {
      visibility: visible;
      opacity: 1;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #e5e7eb;
      border-top: 6px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loadingText {
      margin-top: 16px;
      font-size: 18px;
      color: #374151;
    }
  </style>
